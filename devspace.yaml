version: v2beta1

vars:
  APP_NAMESPACE: platform
  E2E_IMAGE: mcr.microsoft.com/playwright:v1.58.2-noble

functions:
  disable_argocd_sync: |-
    if kubectl get application chat-app -n argocd >/dev/null 2>&1; then
      echo "Disabling ArgoCD auto-sync for chat-app..."
      kubectl patch application chat-app -n argocd \
        --type merge \
        -p '{"spec":{"syncPolicy":{"automated":null}}}'
      echo "ArgoCD auto-sync disabled."
    else
      echo "WARNING: ArgoCD Application 'chat-app' not found in argocd namespace."
    fi
  restore_argocd_sync: &restore_argocd_sync |-
    if kubectl get application chat-app -n argocd >/dev/null 2>&1; then
      echo "Re-enabling ArgoCD auto-sync for chat-app..."
      kubectl patch application chat-app -n argocd \
        --type merge \
        -p '{"spec":{"syncPolicy":{"automated":{"prune":true,"selfHeal":true}}}}'
      echo "ArgoCD auto-sync restored."
    else
      echo "WARNING: ArgoCD Application 'chat-app' not found in argocd namespace."
    fi

deployments:
  e2e-runner:
    namespace: ${APP_NAMESPACE}
    helm:
      chart:
        name: component-chart
        repo: https://charts.devspace.sh
      values:
        containers:
          - image: ${E2E_IMAGE}
            env:
              - name: E2E_BASE_URL
                value: "http://localhost:3000"
        labels:
          app.kubernetes.io/name: chat-app-e2e

commands:
  test-e2e: |-
    devspace run-pipeline test-e2e $@

pipelines:
  dev:
    flags:
      - name: watch
        short: w
        description: "Keep DevSpace running and stream logs"
    run: |-
      disable_argocd_sync
      if [ "$(get_flag "watch")" == "true" ]; then
        start_dev --disable-pod-replace chat-app
      else
        start_dev --disable-pod-replace chat-app
        echo "Dev environment ready. Stopping dev session."
        stop_dev chat-app
      fi

  test-e2e:
    run: |-
      create_deployments e2e-runner
      start_dev e2e-runner &
      sleep 5
      exec_container \
        --label-selector "app.kubernetes.io/name=chat-app-e2e" \
        -n ${APP_NAMESPACE} \
        -- bash -c '
          echo "Waiting for file sync..."
          for i in $(seq 1 60); do
            [ -f /opt/app/data/package.json ] && [ -f /opt/app/data/pnpm-lock.yaml ] && [ -f /opt/app/data/test/e2e/fixtures.ts ] && [ -f /opt/app/data/src/App.tsx ] && break
            sleep 2
          done
          if [ ! -f /opt/app/data/package.json ] || [ ! -f /opt/app/data/pnpm-lock.yaml ] || [ ! -f /opt/app/data/test/e2e/fixtures.ts ] || [ ! -f /opt/app/data/src/App.tsx ]; then
            echo "ERROR: file sync timed out - package.json, pnpm-lock.yaml, test/e2e/fixtures.ts, or src/App.tsx not found after 120s"
            exit 1
          fi
          sleep 5
          cd /opt/app/data
          corepack enable
          pnpm install --frozen-lockfile
          VITE_API_BASE_URL=/api \
          VITE_OIDC_AUTHORITY=https://mockauth.dev/r/301ebb13-15a8-48f4-baac-e3fa25be29fc/oidc \
          VITE_OIDC_CLIENT_ID=client_MU95KU3gHQf5Ir7p \
          VITE_OIDC_REDIRECT_URI=http://localhost:3000/callback \
          VITE_OIDC_POST_LOGOUT_REDIRECT_URI=http://localhost:3000 \
          VITE_OIDC_SCOPE="openid profile email" \
          pnpm build
          pnpm preview --host 0.0.0.0 --port 3000 > /tmp/preview.log 2>&1 &
          PREVIEW_PID=$!
          echo "Waiting for preview server..."
          READY=0
          for i in $(seq 1 60); do
            curl -sf http://localhost:3000 > /dev/null 2>&1 && READY=1 && break
            sleep 2
          done
          if [ "$READY" -ne 1 ]; then
            echo "ERROR: preview server failed to start"
            cat /tmp/preview.log || true
            kill $PREVIEW_PID || true
            exit 1
          fi
          E2E_BASE_URL=http://localhost:3000 pnpm test:e2e
          EXIT_CODE=$?
          kill $PREVIEW_PID || true
          exit $EXIT_CODE
        '
      EXIT_CODE=$?
      stop_dev e2e-runner
      purge_deployments e2e-runner
      exit $EXIT_CODE

hooks:
  - name: restore-argocd-auto-sync
    events:
      - after:dev:chat-app
    command: bash
    args:
      - -c
      - *restore_argocd_sync

dev:
  chat-app:
    namespace: ${APP_NAMESPACE}
    labelSelector:
      app.kubernetes.io/name: chat-app
      app.kubernetes.io/instance: chat-app
    containers:
      chat-app:
        sync:
          - path: ./dist:/usr/share/nginx/html
            excludePaths:
              - .git/
              - .devspace/
              - node_modules/
        logs:
          enabled: true
          lastLines: 200
    ports:
      - port: "3000"

  e2e-runner:
    namespace: ${APP_NAMESPACE}
    labelSelector:
      app.kubernetes.io/name: chat-app-e2e
    command: ["sleep", "infinity"]
    workingDir: /opt/app/data
    sync:
      - path: ./:/opt/app/data
        excludePaths:
          - .git/
          - .devspace/
          - node_modules/
