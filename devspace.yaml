version: v2beta1

vars:
  APP_NAMESPACE: platform
  E2E_IMAGE: mcr.microsoft.com/playwright:v1.58.2-noble

functions:
  disable_argocd_sync: |-
    if kubectl get application chat-app -n argocd >/dev/null 2>&1; then
      echo "Disabling ArgoCD auto-sync for chat-app..."
      kubectl patch application chat-app -n argocd \
        --type merge \
        -p '{"spec":{"syncPolicy":{"automated":null}}}'
      echo "ArgoCD auto-sync disabled."
    else
      echo "WARNING: ArgoCD Application 'chat-app' not found in argocd namespace."
    fi
  restore_argocd_sync: &restore_argocd_sync |-
    if kubectl get application chat-app -n argocd >/dev/null 2>&1; then
      echo "Re-enabling ArgoCD auto-sync for chat-app..."
      kubectl patch application chat-app -n argocd \
        --type merge \
        -p '{"spec":{"syncPolicy":{"automated":{"prune":true,"selfHeal":true}}}}'
      echo "ArgoCD auto-sync restored."
    else
      echo "WARNING: ArgoCD Application 'chat-app' not found in argocd namespace."
    fi

deployments:
  e2e-runner:
    namespace: ${APP_NAMESPACE}
    helm:
      chart:
        name: component-chart
        repo: https://charts.devspace.sh
      values:
        containers:
          - image: ${E2E_IMAGE}
            command: ["sleep", "infinity"]
            env:
              - name: E2E_BASE_URL
                value: "https://chat.agyn.dev"
              - name: E2E_HOST
                value: "chat.agyn.dev"
        labels:
          app.kubernetes.io/name: chat-app-e2e

commands:
  test-e2e: |-
    devspace run-pipeline test-e2e $@

pipelines:
  dev:
    flags:
      - name: watch
        short: w
        description: "Keep DevSpace running and stream logs"
    run: |-
      disable_argocd_sync
      if [ "$(get_flag "watch")" == "true" ]; then
        start_dev --disable-pod-replace chat-app
      else
        start_dev --disable-pod-replace chat-app
        echo "Dev environment ready. Stopping dev session."
        stop_dev chat-app
      fi

  test-e2e:
    run: |-
      GATEWAY_IP=$(kubectl get svc istio-ingressgateway \
        -n istio-gateway \
        -o jsonpath='{.spec.clusterIP}')
      if [ -z "$GATEWAY_IP" ]; then
        echo "ERROR: Could not resolve istio-ingressgateway ClusterIP" >&2
        exit 1
      fi
      echo "Resolved istio-ingressgateway ClusterIP: $GATEWAY_IP"

      create_deployments e2e-runner

      echo "Waiting for e2e-runner pod..."
      kubectl wait pod \
        -l app.kubernetes.io/name=chat-app-e2e \
        -n ${APP_NAMESPACE} \
        --for=condition=Ready \
        --timeout=120s

      POD_NAME=$(kubectl get pod \
        -l app.kubernetes.io/name=chat-app-e2e \
        -n ${APP_NAMESPACE} \
        -o jsonpath='{.items[0].metadata.name}')

      echo "Injecting /etc/hosts entry for chat.agyn.dev..."
      kubectl exec "$POD_NAME" -n ${APP_NAMESPACE} -- \
        bash -c "echo '$GATEWAY_IP chat.agyn.dev' >> /etc/hosts"

      echo "Preparing workspace..."
      kubectl exec "$POD_NAME" -n ${APP_NAMESPACE} -- \
        bash -c "rm -rf /opt/app/data && mkdir -p /opt/app/data"

      echo "Resetting agent data..."
      kubectl exec -n ${APP_NAMESPACE} platform-db-0 -- sh -c \
        "PGPASSWORD=agents psql -U agents -d agents -c 'TRUNCATE \"RunMessage\", \"Run\", \"Message\", \"Thread\", \"Reminder\", \"Container\", \"ContainerEvent\", \"ConversationState\", context_items, event_attachments, event_messages, injections, llm_call_context_items, llm_calls, run_events, summarizations, tool_calls, tool_executions, tool_output_chunks, tool_output_terminals RESTART IDENTITY CASCADE;'"

      echo "Seeding test thread..."
      kubectl exec "$POD_NAME" -n ${APP_NAMESPACE} -- \
        bash -c "curl -s -H 'Content-Type: application/json' -d '{\"agentNodeId\":\"703f1549-906e-472f-adeb-7fdbb88349cd\",\"text\":\"Seed thread for tests\"}' http://platform-server.platform.svc.cluster.local:3010/api/agents/threads >/dev/null"

      echo "Copying test files to pod..."
      kubectl cp . "${APP_NAMESPACE}/${POD_NAME}:/opt/app/data" \
        --no-preserve=true

      echo "Running e2e tests..."
      kubectl exec "$POD_NAME" -n ${APP_NAMESPACE} -- bash -c \
        'cd /opt/app/data && corepack enable && CI=true pnpm install --frozen-lockfile && pnpm test:e2e'
      EXIT_CODE=$?

      echo "Copying test results back..."
      kubectl cp "${APP_NAMESPACE}/${POD_NAME}:/opt/app/data/playwright-report" ./playwright-report 2>/dev/null || true
      kubectl cp "${APP_NAMESPACE}/${POD_NAME}:/opt/app/data/test-results" ./test-results 2>/dev/null || true

      purge_deployments e2e-runner
      exit $EXIT_CODE

hooks:
  - name: restore-argocd-auto-sync
    events:
      - after:dev:chat-app
    command: bash
    args:
      - -c
      - *restore_argocd_sync

dev:
  chat-app:
    namespace: ${APP_NAMESPACE}
    labelSelector:
      app.kubernetes.io/name: chat-app
      app.kubernetes.io/instance: chat-app
    containers:
      chat-app:
        sync:
          - path: ./dist:/usr/share/nginx/html
            excludePaths:
              - .git/
              - .devspace/
              - node_modules/
        logs:
          enabled: true
          lastLines: 200
    ports:
      - port: "3000"
