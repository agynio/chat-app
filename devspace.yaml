version: v2beta1

vars:
  APP_NAMESPACE: platform
  E2E_IMAGE: mcr.microsoft.com/playwright:v1.58.2-noble

functions:
  disable_argocd_sync: |-
    if kubectl get application chat-app -n argocd >/dev/null 2>&1; then
      echo "Disabling ArgoCD auto-sync for chat-app..."
      kubectl patch application chat-app -n argocd \
        --type merge \
        -p '{"spec":{"syncPolicy":{"automated":null}}}'
      echo "ArgoCD auto-sync disabled."
    else
      echo "WARNING: ArgoCD Application 'chat-app' not found in argocd namespace."
    fi
  restore_argocd_sync: &restore_argocd_sync |-
    if kubectl get application chat-app -n argocd >/dev/null 2>&1; then
      echo "Re-enabling ArgoCD auto-sync for chat-app..."
      kubectl patch application chat-app -n argocd \
        --type merge \
        -p '{"spec":{"syncPolicy":{"automated":{"prune":true,"selfHeal":true}}}}'
      echo "ArgoCD auto-sync restored."
    else
      echo "WARNING: ArgoCD Application 'chat-app' not found in argocd namespace."
    fi
  deploy_pr_image: |-
    echo "Deploying PR image to cluster..."
    IMAGE="${PR_IMAGE:-}"
    if [ -z "$IMAGE" ]; then
      echo "ERROR: PR_IMAGE not set, aborting hot deploy"
      exit 1
    fi
    kubectl set image deployment/chat-app chat-app="$IMAGE" -n ${APP_NAMESPACE}
    kubectl rollout status deployment/chat-app -n ${APP_NAMESPACE} --timeout=120s
    echo "PR image deployed successfully"
  patch_orchestrator: |-
    echo "--- Patching orchestrator for e2e ---"
    CLUSTER_ADMIN_TOKEN=$(kubectl get deployment gateway-gateway -n platform -o jsonpath='{.spec.template.spec.containers[0].env[?(@.name=="CLUSTER_ADMIN_TOKEN")].value}')
    if [ -z "$CLUSTER_ADMIN_TOKEN" ]; then
      echo "ERROR: CLUSTER_ADMIN_TOKEN not found in gateway deployment spec"
    else
      echo "CLUSTER_ADMIN_TOKEN extracted (length=${#CLUSTER_ADMIN_TOKEN})"
    fi
    # Find index of AGENT_LLM_BASE_URL to replace it
    LLM_INDEX=$(kubectl get deployment agents-orchestrator -n platform -o json | \
      jq '.spec.template.spec.containers[0].env | to_entries[] | select(.value.name == "AGENT_LLM_BASE_URL") | .key')
    echo "AGENT_LLM_BASE_URL found at env index: $LLM_INDEX"
    # Build a single JSON patch that does everything atomically
    PATCH="["
    if [ -n "$LLM_INDEX" ]; then
      PATCH="${PATCH}{\"op\":\"replace\",\"path\":\"/spec/template/spec/containers/0/env/${LLM_INDEX}/value\",\"value\":\"https://testllm.dev/v1/org/agynio/suite/codex\"},"
    fi
    # Append new env vars at the end of the env array
    PATCH="${PATCH}{\"op\":\"add\",\"path\":\"/spec/template/spec/containers/0/env/-\",\"value\":{\"name\":\"AGENT_MODEL_OVERRIDE\",\"value\":\"simple-hello\"}},"
    PATCH="${PATCH}{\"op\":\"add\",\"path\":\"/spec/template/spec/containers/0/env/-\",\"value\":{\"name\":\"AGENT_GATEWAY_ADDRESS\",\"value\":\"gateway-gateway.platform.svc.cluster.local:8080\"}},"
    PATCH="${PATCH}{\"op\":\"add\",\"path\":\"/spec/template/spec/containers/0/env/-\",\"value\":{\"name\":\"AGENT_AUTH_TOKEN\",\"value\":\"${CLUSTER_ADMIN_TOKEN}\"}}"
    PATCH="${PATCH}]"
    echo "Applying patch..."
    kubectl patch deployment agents-orchestrator -n platform --type=json -p "$PATCH"
    kubectl rollout status deployment/agents-orchestrator -n platform --timeout=120s
    echo "--- Verifying orchestrator env (full list) ---"
    kubectl get deployment agents-orchestrator -n platform -o jsonpath='{range .spec.template.spec.containers[0].env[*]}{.name}={.value}{"\n"}{end}'
    echo "--- Orchestrator pod status ---"
    kubectl get pods -n platform -l app.kubernetes.io/name=agents-orchestrator -o wide
    echo "--- Orchestrator logs (last 30 lines) ---"
    kubectl logs deploy/agents-orchestrator -n platform --tail=30 || true
    echo "--- Patching complete ---"
  dump_agent_logs: |-
    echo "=== ORCHESTRATOR LOGS ==="
    kubectl logs deploy/agents-orchestrator -n platform --tail=100 || true
    echo "=== AGENT WORKLOAD PODS (agyn-workloads) ==="
    kubectl get pods -n agyn-workloads -o wide 2>/dev/null || true
    echo "=== AGENT WORKLOAD LOGS ==="
    for pod in $(kubectl get pods -n agyn-workloads -o name 2>/dev/null); do
      echo "--- $pod ---"
      kubectl logs "$pod" -n agyn-workloads --all-containers --tail=50 2>/dev/null || true
    done
    echo "=== K8S-RUNNER LOGS ==="
    kubectl logs deploy/k8s-runner -n platform --tail=50 || true
    echo "=== END DIAGNOSTIC LOGS ==="

deployments:
  e2e-runner:
    namespace: ${APP_NAMESPACE}
    helm:
      chart:
        name: component-chart
        repo: https://charts.devspace.sh
      values:
        containers:
          - image: ${E2E_IMAGE}
            env:
              - name: E2E_BASE_URL
                value: "https://chat.agyn.dev"
              - name: ARGOS_TOKEN
                value: "${ARGOS_TOKEN}"
              - name: ARGOS_BRANCH
                value: "${ARGOS_BRANCH}"
              - name: ARGOS_COMMIT
                value: "${ARGOS_COMMIT}"
              - name: CI
                value: "${CI}"
        labels:
          app.kubernetes.io/name: chat-app-e2e

commands:
  test-e2e: |-
    devspace run-pipeline test-e2e $@

pipelines:
  dev:
    flags:
      - name: watch
        short: w
        description: "Keep DevSpace running and stream logs"
    run: |-
      disable_argocd_sync
      if [ "$(get_flag "watch")" == "true" ]; then
        start_dev --disable-pod-replace chat-app
      else
        start_dev --disable-pod-replace chat-app
        echo "Dev environment ready. Stopping dev session."
        stop_dev chat-app
      fi

  test-e2e:
    run: |-
      disable_argocd_sync
      deploy_pr_image
      patch_orchestrator
      create_deployments e2e-runner
      start_dev e2e-runner &
      sleep 5
      set +e
      exec_container \
        --label-selector "app.kubernetes.io/name=chat-app-e2e" \
        -n ${APP_NAMESPACE} \
        -- bash -c '
          echo "Waiting for file sync..."
          for i in $(seq 1 60); do
            [ -f /opt/app/data/package.json ] && [ -f /opt/app/data/pnpm-lock.yaml ] && [ -f /opt/app/data/test/e2e/fixtures.ts ] && [ -f /opt/app/data/test/e2e/multi-user-fixtures.ts ] && [ -f /opt/app/data/test/e2e/chat-api.ts ] && [ -f /opt/app/data/test/e2e/chat-exchange.spec.ts ] && [ -f /opt/app/data/test/e2e/chat-detail.spec.ts ] && [ -f /opt/app/data/test/e2e/chats-list.spec.ts ] && [ -f /opt/app/data/test/e2e/sign-in-helper.ts ] && [ -f /opt/app/data/test/e2e/sign-in.spec.ts ] && break
            sleep 2
          done
          if [ ! -f /opt/app/data/package.json ] || [ ! -f /opt/app/data/pnpm-lock.yaml ] || [ ! -f /opt/app/data/test/e2e/fixtures.ts ] || [ ! -f /opt/app/data/test/e2e/multi-user-fixtures.ts ] || [ ! -f /opt/app/data/test/e2e/chat-api.ts ] || [ ! -f /opt/app/data/test/e2e/chat-exchange.spec.ts ] || [ ! -f /opt/app/data/test/e2e/chat-detail.spec.ts ] || [ ! -f /opt/app/data/test/e2e/chats-list.spec.ts ] || [ ! -f /opt/app/data/test/e2e/sign-in-helper.ts ] || [ ! -f /opt/app/data/test/e2e/sign-in.spec.ts ]; then
            echo "ERROR: File sync timed out (package.json, pnpm-lock.yaml, or test/e2e files not found after 120s)"
            exit 1
          fi
          sleep 5
          cd /opt/app/data
          corepack enable
          pnpm install --frozen-lockfile
          E2E_BASE_URL=https://chat.agyn.dev ARGOS_TOKEN=${ARGOS_TOKEN} ARGOS_BRANCH=${ARGOS_BRANCH} ARGOS_COMMIT=${ARGOS_COMMIT} CI=true pnpm test:e2e
        '
      EXIT_CODE=$?
      set -e
      dump_agent_logs || true
      stop_dev e2e-runner
      purge_deployments e2e-runner
      restore_argocd_sync
      exit ${EXIT_CODE}

hooks:
  - name: restore-argocd-auto-sync
    events:
      - after:dev:chat-app
    command: bash
    args:
      - -c
      - *restore_argocd_sync

dev:
  e2e-runner:
    namespace: ${APP_NAMESPACE}
    labelSelector:
      app.kubernetes.io/name: chat-app-e2e
    command: ["sleep", "infinity"]
    workingDir: /opt/app/data
    sync:
      - path: ./:/opt/app/data
        excludePaths:
          - .git/
          - .devspace/
          - node_modules/
          - dist/
  chat-app:
    namespace: ${APP_NAMESPACE}
    labelSelector:
      app.kubernetes.io/name: chat-app
      app.kubernetes.io/instance: chat-app
    containers:
      chat-app:
        sync:
          - path: ./dist:/usr/share/nginx/html
            excludePaths:
              - .git/
              - .devspace/
              - node_modules/
        logs:
          enabled: true
          lastLines: 200
    ports:
      - port: "3000"
