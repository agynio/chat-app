name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.5.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          VITE_API_BASE_URL: /api

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      AGYN_AGENT_INIT_IMAGE: ghcr.io/agynio/agent-init-agn:0.4.16
      AGN_INIT_IMAGE: ghcr.io/agynio/agent-init-agn:0.4.16
      CODEX_INIT_IMAGE: ghcr.io/agynio/agent-init-codex:0.13.20
      CLAUDE_INIT_IMAGE: ghcr.io/agynio/agent-init-claude:0.1.23
      AGN_EXPOSE_INIT_IMAGE: ghcr.io/agynio/agent-init-agn:0.4.16
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.5.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          VITE_API_BASE_URL: /api

      - name: Provision cluster
        uses: agynio/bootstrap/.github/actions/provision@main

      - name: Setup DevSpace
        uses: agynio/e2e/.github/actions/setup-devspace@main

      - name: Disable ArgoCD auto-sync
        shell: bash
        run: |
          set -euo pipefail
          if kubectl get application chat-app -n argocd >/dev/null 2>&1; then
            kubectl patch application chat-app -n argocd \
              --type merge \
              -p '{"spec":{"syncPolicy":{"automated":null}}}'
          else
            echo "WARNING: ArgoCD Application 'chat-app' not found."
          fi

      - name: Allow devspace sync into nginx html
        shell: bash
        run: |
          set -euo pipefail
          kubectl get deployment chat-app -n platform
          kubectl patch deployment chat-app -n platform --type strategic \
            -p "$(cat <<'EOF'
          {
            "spec": {
              "template": {
                "spec": {
                  "volumes": [
                    {
                      "name": "chat-app-html",
                      "emptyDir": {}
                    }
                  ],
                  "containers": [
                    {
                      "name": "chat-app",
                      "readinessProbe": {
                        "httpGet": {
                          "path": "/healthz",
                          "port": "http"
                        }
                      },
                      "volumeMounts": [
                        {
                          "name": "chat-app-html",
                          "mountPath": "/usr/share/nginx/html"
                        }
                      ]
                    }
                  ]
                }
              }
            }
          }
          EOF
          )"
          kubectl rollout status deployment/chat-app -n platform --timeout=5m

      - name: Deploy from source
        run: devspace dev --pipeline dev

      - name: Run E2E tests
        uses: agynio/e2e/.github/actions/run-tests@main
        with:
          service: chat_app

      - name: Restore ArgoCD auto-sync
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if kubectl get application chat-app -n argocd >/dev/null 2>&1; then
            kubectl patch application chat-app -n argocd \
              --type merge \
              -p '{"spec":{"syncPolicy":{"automated":{"prune":true,"selfHeal":true}}}}'
          else
            echo "WARNING: ArgoCD Application 'chat-app' not found."
          fi
