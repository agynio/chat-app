name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.5.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          VITE_API_BASE_URL: /api

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.5.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          VITE_API_BASE_URL: /api

      - name: Provision cluster
        uses: agynio/bootstrap/.github/actions/provision@main

      - name: Setup DevSpace
        uses: agynio/e2e/.github/actions/setup-devspace@main

      - name: Disable ArgoCD auto-sync
        shell: bash
        run: |
          set -euo pipefail
          if kubectl get application chat-app -n argocd >/dev/null 2>&1; then
            kubectl patch application chat-app -n argocd \
              --type merge \
              -p '{"spec":{"syncPolicy":{"automated":null}}}'
          else
            echo "WARNING: ArgoCD Application 'chat-app' not found."
          fi

      - name: Deploy from source
        run: devspace dev --pipeline dev

      - name: Run E2E tests
        uses: agynio/e2e/.github/actions/run-tests@main
        with:
          service: chat_app
        env:
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
          ARGOS_BRANCH: ${{ github.head_ref || github.ref_name }}
          ARGOS_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Restore ArgoCD auto-sync
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if kubectl get application chat-app -n argocd >/dev/null 2>&1; then
            kubectl patch application chat-app -n argocd \
              --type merge \
              -p '{"spec":{"syncPolicy":{"automated":{"prune":true,"selfHeal":true}}}}'
          else
            echo "WARNING: ArgoCD Application 'chat-app' not found."
          fi
