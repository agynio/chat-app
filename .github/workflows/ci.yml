name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Enable pnpm
        run: corepack enable

      - name: Install pnpm
        run: corepack prepare pnpm@10.5.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build scripts
        run: pnpm rebuild esbuild --pending

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
        env:
          VITE_API_BASE_URL: /api
